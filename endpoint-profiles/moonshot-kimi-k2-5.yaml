id: moonshot-kimi-k2-5
dialect: openai_chat_v1
base_url: https://api.moonshot.ai/v1
model: kimi-k2.5
auth:
  kind: bearer_env
  env_var: MOONSHOT_API_KEY_FP
capabilities:
  exposes_reasoning_text: true
  supports_json_object_response: true
  supports_temperature: true
  supports_top_p: true
  supports_output_token_cap: true
request_mapping:
  output_token_cap_field: max_tokens
  json_response_shape:
    type: json_object
  static_body:
    temperature: 1.0
    top_p: 0.95
response_mapping:
  answer_text_path: choices.0.message.content
  reasoning_text_path: choices.0.message.reasoning_content
  finish_reason_path: choices.0.finish_reason
  usage_paths:
    prompt_tokens: usage.prompt_tokens
    output_tokens: usage.completion_tokens
    total_tokens: usage.total_tokens
timeout_policy:
  connect_seconds: 15
  read_seconds: 180
retry_policy:
  max_attempts: 2
  retryable_statuses: [408, 429, 500, 502, 503, 504]
