id: p024
name: dense_state_tracking_with_defaults
family: state_tracking
intent: 用多对象事件流、默认规则和例外规则测试最终状态归约能力
messages:
  - role: system
    content: |
      只返回 JSON 对象，不要输出 markdown，不要附加解释。
  - role: user
    content: |
      根据下面规则和事件，计算 ticket_a、ticket_b、worker_x 的最终状态。

      规则：
      - 默认 priority 是 p2
      - 显式 priority 更新覆盖默认值
      - suspend 会保留最后一个 owner，并把 status 变成 suspended
      - close 会保留最后一个 owner
      - reopen 会把 status 变回 open

      事件：
      - [r1] create ticket_a owner=ops
      - [r2] create ticket_b owner=db
      - [r3] create worker_x owner=ml
      - [r4] update ticket_a priority=p1
      - [r5] close ticket_a
      - [r6] reopen ticket_b
      - [r7] assign worker_x owner=ops
      - [r8] suspend worker_x
      - [r9] assign worker_x owner=ml
      - [r10] update worker_x priority=p3

      返回 JSON，对象字段必须且只能包含：
      - task_result
      - evidence
      - unknowns
      - violations
generation:
  temperature: 0.0
  top_p: 1.0
  max_output_tokens: 360
  response_format: text
  reasoning_mode: capture_if_available
output_contract:
  id: tolerant_json_v3
  canonicalizer: tolerant_json_v3
extractors:
  answer: state_tracking_v3
  score: state_tracking_score_v3
  reasoning: reasoning_trace_v1
  transport: completion_metadata_v1
evaluation:
  reference:
    expected_task_result:
      ticket_a:
        status: closed
        owner: ops
        priority: p1
      ticket_b:
        status: open
        owner: db
        priority: p2
      worker_x:
        status: suspended
        owner: ml
        priority: p3
    expected_evidence:
      derivation_codes:
        ticket_a: r5
        ticket_b: r6
        worker_x: r10
      defaults_used:
        - ticket_b.priority
required_capabilities: [chat_completions]
weight_hint: 0.99
tags: [v3, state, defaults, exceptions]
risk_level: low
