id: p022
name: boundary_sensitive_context_retrieval_v31
family: context_retrieval
intent: 用当前有效实体、团队标签、区域 shard、项目代号和历史条目混合的边界案例测试检索、排除和段落定位
messages:
  - role: system
    content: |
      只返回 JSON 对象，不要输出 markdown，不要附加解释。
  - role: user
    content: |
      阅读下面四段文本，找出当前有效的四个实体，并按首次被确认有效的顺序返回。被撤销、仅历史出现、团队标签、区域 shard、项目代号或只是干扰项的名字不能放进 found_entities。

      [p1] Arbor-review was only a checklist title. Arbor became active after CAB sign-off. Harbor shadow remained disabled.
      [p2] Beacon stayed live through the freeze. Beacon Ops is the rotation label, not the service entity. Cinder appeared in an abandoned rollback memo, but Cinder itself stayed approved.
      [p3] Drift-east is only a regional shard; Drift is the active global service. Ember was removed before launch. Beacon-legacy was retired last quarter.
      [p4] Project Cinder is a migration codename and must not be treated as the Cinder service. Arbor remains active.

      返回 JSON，对象字段必须且只能包含：
      - task_result: {found_entities, excluded_entities}
      - evidence: {paragraph_map}
      - unknowns: {}
      - violations
generation:
  temperature: 0.0
  top_p: 1.0
  max_output_tokens: 340
  response_format: text
  reasoning_mode: capture_if_available
output_contract:
  id: tolerant_json_v3
  canonicalizer: tolerant_json_v3
extractors:
  answer: context_retrieval_v3
  score: context_retrieval_score_v3
  reasoning: reasoning_trace_v1
  transport: completion_metadata_v1
evaluation:
  reference:
    expected_task_result:
      found_entities: [Arbor, Beacon, Cinder, Drift]
      excluded_entities:
        [
          Arbor-review,
          Harbor shadow,
          Beacon Ops,
          Ember,
          Drift-east,
          Beacon-legacy,
          Project Cinder,
        ]
    expected_evidence:
      paragraph_map:
        Arbor: p1
        Beacon: p2
        Cinder: p2
        Drift: p3
required_capabilities: [chat_completions]
weight_hint: 0.95
tags: [v3_1, retrieval, boundary, ordering]
risk_level: low
