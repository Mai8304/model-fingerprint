    expected_task_result:
      owner: Alice Wong
      role: Primary DBA
      region: null
      change_window: 2026-03-21 02:00 UTC
required_capabilities: [chat_completions]
weight_hint: 0.97
tags: [v3, grounding, evidence, abstain]
risk_level: low
