id: p017
name: dual_ticket_state_reduction
family: state_tracking
intent: 用多步事件覆盖和默认值测试最终状态归约能力
messages:
  - role: system
    content: |
      只返回 JSON 对象，不要输出 markdown，不要附加解释。
  - role: user
    content: |
      根据下面事件，计算 ticket_a 和 ticket_b 的最终 status、owner、priority。

      规则：
      - 默认 priority 是 p2
      - 显式 priority 更新覆盖默认值
      - close 事件会保留最后一个 owner

      事件：
      - [r1] create ticket_a owner=ops
      - [r2] create ticket_b owner=db
      - [r3] update ticket_a priority=p1
      - [r4] close ticket_a
      - [r5] reopen ticket_b

      返回 JSON，对象字段必须且只能包含：
      - task_result
      - derivation_codes
      - defaults_used
      - violations
generation:
  temperature: 0.0
  top_p: 1.0
  max_output_tokens: 300
  response_format: text
  reasoning_mode: capture_if_available
output_contract:
  id: strict_json_v2
  canonicalizer: strict_json_v2
extractors:
  answer: state_tracking_v1
  score: state_tracking_score_v1
  reasoning: reasoning_trace_v1
  transport: completion_metadata_v1
evaluation:
  reference:
    expected_task_result:
      ticket_a:
        status: closed
        owner: ops
        priority: p1
      ticket_b:
        status: open
        owner: db
        priority: p2
    expected_derivation_codes:
      ticket_a: r4
      ticket_b: r5
    expected_defaults_used:
      - ticket_b.priority
required_capabilities: [chat_completions]
weight_hint: 0.95
tags: [v2, state, rules]
risk_level: low
